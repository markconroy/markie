site_name: AI (Artificial Intelligence) module for Drupal
repo_url: https://git.drupalcode.org/project/ai
repo_name: drupal/ai
edit_uri: -/tree/1.1.x/docs/
theme:
  name: material
  font:
    code: Roboto Mono
  palette:
    primary: indigo
  features:
    - header.autohide
    - navigation.footer
    - content.action.edit
plugins:
  - glightbox
  # Include Markdown: Allows embedding markdown files in one another with {% include-markdown "file.md" %}
  # https://github.com/mondeja/mkdocs-include-markdown-plugin
  - include-markdown:
      encoding: ascii
  - search:
      lang: en
  - mike:
      alias_type: redirect
      # This is for SEO reasons, not redirects.
      canonical_version: 1.2.0
      version_selector: true
      deploy_prefix: "mkdocs"
markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
extra:
  social:
    - icon: fontawesome/brands/gitlab
      link: https://git.drupalcode.org/project/ai
    - icon: fontawesome/brands/slack
      link: https://drupal.slack.com/archives/C0803LX4536
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/drupal-ai
  version:
    provider: mike
