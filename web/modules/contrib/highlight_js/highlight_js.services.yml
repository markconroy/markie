  plugin.manager.ckedito5_highlight_js:
    alias: plugin.manager.ckeditor5_highlight_js

  Drupal\highlight_js\Hook\HighlightJsHooks:
    class: Drupal\highlight_js\Hook\HighlightJsHooks
    autowire: true
